<!DOCTYPE html>
<html>
<head>
    <title>FitMind AI</title>
    <link rel="stylesheet" href="/static/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/your-kit.js" crossorigin="anonymous"></script>
</head>

<body>
<div class="container">

    <h1 class="title">🚀 FitMind AI</h1>
    <p class="subtitle">Your Personal AI Health Dashboard</p>

    <div class="grid">

        <div class="card fade-in">
            <h2>💪 Health Score</h2>
            <p class="big">{{ score }}/100</p>
        </div>

        <div class="card fade-in delay">
            <h2>🔮 Predicted Score</h2>
            <p class="big">{{ predicted }}/100</p>
        </div>

    </div>

    <div class="card chart fade-in delay2">
        <h2>📊 Health Insights</h2>
        <img src="{{ chart }}">
    </div>

    <div class="card advice fade-in delay3">
        <h2>🤖 AI Coach</h2>
        <p>{{ advice }}</p>
    </div>

    <a href="/" class="btn">🔙 Analyze Again</a>

</div>
</body>
</html>
